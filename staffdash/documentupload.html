
<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../assets/css/global.css" />
                
        <!-- Tailwind CDN -->
        <script src="https://cdn.tailwindcss.com"></script> 

        <!-- Tailwind Config -->
        <script>
            tailwind.config = {
            theme: {
                extend: {
                colors: {
                    primary: '',
                    secondary: '',
                    neutralBg: '',
                    neutralText: '',
                    accent: '#000080',
                    
                },
                fontFamily: {
                    customFont: ['open sans', 'sans-serif'],
                    
                },
                borderRadius: {
                    custom: '50px',
                }
                }
            }
            }
        </script>

        <title>ETELF | DOCUMENTS UPLOAD</title>
    </head>
    <body class="font-customFont bg-gray-100 h-screen overflow-hidden">

    <!-- HEADER -->
    <div id="staffSidebarHead"></div>

    <!-- PAGE LAYOUT -->
    <div class="flex  h-[calc(100vh-4rem)] relative">

        <!-- SIDEBAR -->
        <div id="staffSidebar" ></div>

        <!-- CONTENT -->
        <main class="flex-1 p-4 lg:p-8 pt-0 overflow-y-auto bg-white transition-all duration-300 min-w-0">
            <!-- Page Title -->
                
            <div class="pt-6 p-4 lg:pt-8 pb-12 bg-gray-50 min-h-full flex justify-center">
    <div class="w-full max-w-3xl">

        <h1 class="text-2xl font-semibold text-accent mb-6 lg:mb-8">Documents Upload</h1>

        <div class="bg-white rounded-xl shadow-sm border p-6 lg:p-10">
            <form class="space-y-6 lg:space-y-8">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Title</label>
                    <input type="text" placeholder="Document title" class="w-full border rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea placeholder="Document description" rows="3" class="w-full border rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600"></textarea>
                </div>

                <label class="block border-2 border-dashed border-gray-300 rounded-xl p-8 lg:p-12 bg-gray-50 hover:bg-gray-100 text-center hover:border-blue-600 transition cursor-pointer">
                    <img src="../assets/upload.png" class="w-12 h-12 lg:w-14 lg:h-14 mx-auto mb-4 opacity-70" alt="Upload">
                    <p class="text-sm font-medium text-gray-800">Upload media (5MB Max)</p>
                    <p class="text-xs text-gray-500 mt-1">Click or drag and drop media here</p>
                    <input type="file" class="hidden">
                </label>

                <div class="pt-4 flex justify-center  border-t border-gray-100 mt-8">
                    <button type="submit" class="w-full sm:w-auto bg-[#0B1E8A] text-white px-10 py-3 rounded-full text-sm font-medium hover:opacity-90 transition">
                        Save and Upload
                    </button>
                </div>

            </form>
        </div>

    </div>
</div>

        </main>

    </div>
    <div id="delete-modal" class="fixed inset-0 bg-black/50 z-[200] hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-sm w-full p-8 text-center shadow-2xl relative z-[210]">
        <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold">
            !
        </div>
        <h2 class="text-xl font-bold mb-2">Delete File?</h2>
        <p class="text-gray-500 text-sm mb-6">This action cannot be undone. Are you sure you want to delete this document?</p>
        
        <div class="flex gap-3">
            <button onclick="closeModal('delete-modal')" class="flex-1 px-4 py-2 bororderder rounded-lg text-sm font-medium hover:bg-gray-50 transition">
                Cancel
            </button>
            <button id="confirm-delete-btn" class="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700 transition">
                Delete
            </button>
            </div>
        </div>
    </div>

    <div id="success-modal" class="fixed inset-0 bg-black/50 z-[200] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-8 text-center shadow-2xl relative z-[210]">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                ✓
            </div>
            <h2 class="text-xl font-bold mb-2">Success!</h2>
            <p class="text-gray-500 text-sm mb-6">Your action has been completed successfully.</p>
            
            <button onclick="closeModal('success-modal')" class="w-full px-4 py-2 bg-[#0B1E8A] text-white rounded-lg text-sm font-medium hover:opacity-90 transition">
                Continue
            </button>
        </div>
    </div>
    <script src="../js/main.js"></script>

</body>
    
 </html>
