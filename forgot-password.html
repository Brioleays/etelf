<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./assets/css/global.css" />
        <script src="https://cdn.tailwindcss.com"></script> 
        <script>
            tailwind.config = {
                theme: { extend: { colors: { accent: '#000080' }, fontFamily: { customFont: ['open sans', 'sans-serif'] }, borderRadius: { custom: '50px' } } }
            }
        </script>
        <title>ETELF | FORGOT PASSWORD</title>
    </head>
    <body class="font-customFont">
        
        <div id="navbar" class="z-10"></div>

        <main class="min-h-screen z-0">
            <section class="my-20 px-6 sm:px-16 rounded-b-custom">
                <div class="max-w-4xl mx-auto text-center">
                    <p class="text-accent text-sm text-center font-semibold uppercase">
                        Recovery
                    </p>
                    <h2 class="text-4xl font-bold mt-6">
                        Forgot Password
                    </h2>
                    <p class="text-gray-600 mt-4 max-w-md mx-auto">
                        Enter the email address associated with your account and we will send you a link to reset your password.
                    </p>

                    <form class="mt-10 max-w-2xl mx-auto text-left">
                        
                        <div class="my-6">
                            <label class="text-xl">Email Address</label>
                            <input type="email" class="w-full py-2 px-4 border border-gray-900 my-2 rounded-xl" placeholder="e.g JohnDoe@gmail.com"/>
                        </div>
                        
                        <div class="mt-8 max-w-xl mx-auto text-center">
                            <a href="#" onclick="alert('Password reset link sent! (This will connect to the email server during backend development)'); return false;">
                                <button type="button" class="w-full bg-accent text-white px-6 py-3 rounded-full hover:scale-105 transition duration-300">
                                    Send Reset Link
                                </button>
                            </a>
                        </div>

                        <div class="mt-8 flex items-center justify-center gap-2">
                            <p class="text-sm text-gray-700">Remembered your password?</p>
                            <a href="./login.html" class="text-accent hover:underline font-bold">Back to Login</a>
                        </div>

                    </form>
                </div>
            </section>
        </main>

        <div id="footerTwo"></div>
        
        <script src="./js/main.js"></script>
    </body>
 </html>
